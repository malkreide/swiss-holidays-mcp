name: Live API Tests

# Live-Tests gegen die echten OpenHolidays- und Nager.Date-APIs. Laufen NICHT auf
# jedem PR, sondern nächtlich und auf manuellen Trigger — Netzwerk-/Dienst-
# Verfügbarkeit darf den normalen CI-Lauf nicht flaky machen.
on:
  schedule:
    - cron: "0 4 * * *"  # täglich 04:00 UTC
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install -e ".[dev]"

      - name: Live-Tests
        run: pytest tests/ -m live -v
        env:
          PYTHONPATH: src
        timeout-minutes: 10
