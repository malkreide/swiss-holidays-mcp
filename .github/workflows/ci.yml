name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: uv installieren
        run: pip install uv

      - name: Abhängigkeiten installieren
        run: uv pip install -e ".[dev]" --system

      - name: Linting mit ruff
        run: ruff check src/ tests/

      - name: Syntax-Prüfung
        run: |
          python -m py_compile src/swiss_school_calendar_mcp/server.py
          python -m py_compile src/swiss_school_calendar_mcp/client.py

      - name: Import-Test
        run: python -c "from swiss_school_calendar_mcp.server import mcp; print('Import OK')"

      - name: Unit-Tests (gemockt, ohne Netzwerk)
        run: pytest tests/ -v -m "not live"
        env:
          PYTHONPATH: src
        timeout-minutes: 5

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install ruff

      - run: ruff check src/ tests/

      - run: ruff format --check src/

  security:
    name: Dependency security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: pip-audit installieren
        run: pip install pip-audit

      - name: Runtime-Dependencies aus pyproject.toml extrahieren
        run: |
          python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print('\n'.join(data['project']['dependencies']))
          " > /tmp/requirements-runtime.txt
          cat /tmp/requirements-runtime.txt

      - name: CVE-Scan auf Runtime-Dependencies
        # Ignorierte CVEs (mit Begründung dokumentieren — Liste regelmässig prüfen):
        # - PYSEC-2025-183 / CVE-2025-45768: pyjwt "weak encryption"; vom Maintainer
        #   disputed (Key-Länge wird vom Anwender gewählt, nicht von der Library).
        #   Kein Upstream-Fix. pyjwt ist transitive Dep von mcp; dieser Server nutzt
        #   pyjwt nicht (keine Auth). Re-evaluieren wenn fix_versions verfügbar.
        run: |
          pip-audit --strict --progress-spinner off \
            -r /tmp/requirements-runtime.txt \
            --ignore-vuln PYSEC-2025-183
